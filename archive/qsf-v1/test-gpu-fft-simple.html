<!DOCTYPE html>
<html>
<head>
   <meta charset="UTF-8">
   <title>GPU FFT Simple Test</title>
   <style>
      body { font-family: monospace; margin: 20px; }
      pre { background: #f0f0f0; padding: 10px; overflow: auto; }
      canvas { border: 1px solid #ccc; margin: 10px 0; }
      button { padding: 10px 20px; margin: 5px; }
   </style>
</head>
<body>
   <h1>GPU FFT Simple 1D Test</h1>
   <button onclick="test1D()">Test 1D FFT</button>
   <button onclick="testIdentity()">Test Identity (should be ~0 error)</button>
   <pre id="log"></pre>
   <canvas id="canvas1" width="256" height="64"></canvas>
   <canvas id="canvas2" width="256" height="64"></canvas>

   <script src="js/gpu-fft.js"></script>
   <script>
      const logEl = document.getElementById('log');
      let lines = [];
      
      function log(msg) {
         lines.push(msg);
         logEl.textContent = lines.join('\n');
         console.log(msg);
      }
      
      function testIdentity() {
         log('===== Identity Test (FFT then IFFT) =====');
         
         // Create simple constant signal
         const N = 256;
         const data = new Float32Array(N * N * 4);
         for (let i = 0; i < N*N; i++) {
            data[i*4 + 0] = 1.0;  // Re
            data[i*4 + 1] = 0.0;  // Im
            data[i*4 + 2] = 0.0;
            data[i*4 + 3] = 1.0;
         }
         
         log('Input: constant value 1.0');
         
         const gl = GPUFFT.getContext();
         const tex = GPUFFT.createFloatTexture(N, N);
         gl.bindTexture(gl.TEXTURE_2D, tex);
         gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, N, N, 0, gl.RGBA, gl.FLOAT, data);
         
         // Forward FFT
         log('Forward FFT...');
         GPUFFT.fft2D(tex, N, N, false);
         
         // Read result - must set up FBO to read from the texture
         let fbo = gl.createFramebuffer();
         gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
         gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
         const fftResult = new Float32Array(N*N*4);
         gl.readPixels(0, 0, N, N, gl.RGBA, gl.FLOAT, fftResult);
         
         // Check: FFT of constant should be N*N at (0,0) and 0 elsewhere
         const dc = Math.sqrt(fftResult[0]*fftResult[0] + fftResult[1]*fftResult[1]);
         log(`FFT DC component: ${dc.toExponential(3)} (should be ~${(N*N).toExponential(3)})`);
         
         // Sample some other values
         let maxFFT = Math.abs(fftResult[0]);
         for (let i = 1; i < 20; i++) {
            maxFFT = Math.max(maxFFT, Math.abs(fftResult[i*4]));
         }
         log(`Max FFT value (first 20): ${maxFFT.toExponential(3)}`);
         
         // Inverse FFT
         log('Inverse FFT...');
         GPUFFT.fft2D(tex, N, N, true);
         
         // Read result with proper FBO binding
         gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
         gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
         const ifftResult = new Float32Array(N*N*4);
         gl.readPixels(0, 0, N, N, gl.RGBA, gl.FLOAT, ifftResult);
         gl.bindFramebuffer(gl.FRAMEBUFFER, null);
         
         // Check first 10 values
         log('First 10 IFFT values:');
         for (let i = 0; i < 10; i++) {
            const re = ifftResult[i*4];
            const im = ifftResult[i*4+1];
            log(`  [${i}]: ${re.toExponential(3)} + i*${im.toExponential(3)}`);
         }
         
         // Check center
         const centerVal = ifftResult[(N/2*N + N/2)*4];
         log(`IFFT center value: ${centerVal.toExponential(3)} (should be ~1.0)`);
         
         let maxErr = 0;
         let maxVal = 0;
         for (let i = 0; i < N*N; i++) {
            const re = ifftResult[i*4];
            const im = ifftResult[i*4+1];
            maxVal = Math.max(maxVal, Math.abs(re), Math.abs(im));
            maxErr = Math.max(maxErr, Math.abs(re - 1.0), Math.abs(im));
         }
         log(`Max value in IFFT: ${maxVal.toExponential(3)}`);
         log(`Max roundtrip error: ${maxErr.toExponential(3)}`);
         
         gl.deleteFramebuffer(fbo);
         gl.deleteTexture(tex);
      }
      
      function test1D() {
         log('===== 1D Sine Wave Test =====');
         
         const N = 256;
         const data = new Float32Array(N * N * 4);
         
         // Create sine wave in Re channel (kx=1, rows constant)
         for (let y = 0; y < N; y++) {
            for (let x = 0; x < N; x++) {
               const phase = 2 * Math.PI * x / N;
               const idx = (y * N + x) * 4;
               data[idx + 0] = Math.cos(phase);  // Re
               data[idx + 1] = Math.sin(phase);  // Im  
               data[idx + 2] = 0;
               data[idx + 3] = 1;
            }
         }
         
         log('Input: e^(i*2π*x/N) (plane wave, kx=1)');
         
         const gl = GPUFFT.getContext();
         const tex = GPUFFT.createFloatTexture(N, N);
         gl.bindTexture(gl.TEXTURE_2D, tex);
         gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, N, N, 0, gl.RGBA, gl.FLOAT, data);
         
         // Forward FFT
         log('Forward FFT...');
         GPUFFT.fft2D(tex, N, N, false);
         
         const fbo = GPUFFT.createFramebuffer(tex);
         gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
         const fftResult = new Float32Array(N*N*4);
         gl.readPixels(0, 0, N, N, gl.RGBA, gl.FLOAT, fftResult);
         
         // For e^(i*2π*x/N), FFT should have peak at k=1
         // Check a few k values
         for (let k = 0; k < 5; k++) {
            const idx = k * 4;
            const mag = Math.sqrt(fftResult[idx]*fftResult[idx] + fftResult[idx+1]*fftResult[idx+1]);
            log(`FFT[k=${k}] magnitude: ${mag.toExponential(3)}`);
         }
         
         // Inverse
         log('Inverse FFT...');
         GPUFFT.fft2D(tex, N, N, true);
         
         const ifftResult = new Float32Array(N*N*4);
         gl.readPixels(0, 0, N, N, gl.RGBA, gl.FLOAT, ifftResult);
         
         log('First 5 IFFT values:');
         for (let x = 0; x < 5; x++) {
            const idx = x * 4;
            const re = ifftResult[idx];
            const im = ifftResult[idx+1];
            log(`  x=${x}: ${re.toExponential(3)} + i*${im.toExponential(3)}`);
         }
         
         gl.deleteFramebuffer(fbo);
         gl.deleteTexture(tex);
      }
      
      window.onload = () => {
         if (!GPUFFT.init()) {
            log('ERROR: GPU FFT init failed');
         } else {
            log('GPU FFT initialized');
         }
      };
   </script>
</body>
</html>
