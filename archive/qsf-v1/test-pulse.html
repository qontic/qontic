<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>FDTD Pulse Test - Outgoing Wave</title>
    <style>
        body { 
            margin: 20px; 
            font-family: monospace; 
            background: #1e1e1e; 
            color: #d4d4d4;
        }
        canvas { 
            border: 1px solid #444; 
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        #log { 
            margin-top: 20px; 
            white-space: pre; 
            font-size: 11px;
            max-height: 400px;
            overflow-y: auto;
            background: #252526;
            padding: 10px;
            border: 1px solid #444;
        }
        button {
            padding: 8px 16px;
            margin: 5px;
            font-size: 14px;
            cursor: pointer;
        }
        .stats {
            background: #252526;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #444;
        }
    </style>
</head>
<body>
    <h2>FDTD Pulse Test: Gaussian Wave Packet (9-Point Isotropic Stencil)</h2>
    <div class="stats">
        <div>Grid: <span id="gridInfo">-</span></div>
        <div>Physics: <span id="physicsInfo">-</span></div>
        <div>Status: <span id="status">initializing...</span></div>
        <div style="color: #4CAF50;">Using 9-point isotropic Laplacian for better circular wave propagation</div>
    </div>
    <button onclick="initPulse()">Initialize Pulse</button>
    <button onclick="step()">Step +10</button>
    <button onclick="runTo(100)">Run to 100</button>
    <button onclick="runTo(200)">Run to 200</button>
    <button onclick="runTo(500)">Run to 500</button>
    <button onclick="runTo(1000)">Run to 1000</button>
    <button onclick="runTo(2000)">Run to 2000</button>
    <button onclick="analyzeField()">Analyze</button>
    <button onclick="clearLog()">Clear Log</button>
    <br><br>
    <canvas id="psi2Canvas" width="640" height="640"></canvas>
    <div style="font-size: 11px; margin-top: 5px;">
        |ψ|² (probability density) - 640×640 display of 128×128 grid
    </div>
    <div id="log"></div>

    <script src="js/fdtd-solver.js"></script>
    <script>
        const NX = 128;
        const NY = 128;
        const worldSize = 800;  // 800 nm square (larger domain)
        
        // Physics for electron at λ=200nm (longer, slower wave)
        const lambda = 200;  // nm
        const k = 2 * Math.PI / lambda;
        const hbar = 1.054e-25;  // nm²·kg/ns
        const mElectron = 9.109e-31;  // kg
        const omega = hbar * k * k / (2 * mElectron);
        
        let initialized = false;
        let currentStep = 0;
        
        function log(msg) {
            const logDiv = document.getElementById('log');
            logDiv.textContent += msg + '\n';
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        function clearLog() {
            document.getElementById('log').textContent = '';
        }
        
        function initFDTD() {
            log('=== Initializing FDTD ===');
            const ok = FDTD.init({
                nx: NX,
                ny: NY,
                worldBounds: {
                    xMin: 0,
                    xMax: worldSize,
                    yMin: 0,
                    yMax: worldSize
                },
                particleMass: mElectron,
                hbar: hbar,
                abcWidth: 15
            });
            
            if (!ok) {
                log('ERROR: FDTD init failed');
                return false;
            }
            
            // Build empty potential (free space)
            FDTD.buildPotential({
                wallX: worldSize * 0.5,
                wallWidth: 5,
                slit1Y: worldSize * 0.5,
                slit2Y: worldSize * 0.5,
                slitWidth: 10,
                slit1Open: false,
                slit2Open: false
            });
            
            const info = FDTD.getGridInfo();
            document.getElementById('gridInfo').textContent = 
                `${info.nx}×${info.ny}, dx=${info.dx.toFixed(3)}, dy=${info.dy.toFixed(3)}, dt=${info.dt.toExponential(2)}`;
            document.getElementById('physicsInfo').textContent = 
                `λ=${lambda}nm, k=${k.toFixed(4)}/nm, ω=${omega.toExponential(2)}rad/ns, k·dx=${(k*info.dx).toFixed(3)}`;
            
            initialized = true;
            log('FDTD initialized successfully');
            return true;
        }
        
        function initPulse() {
            if (!initialized) {
                if (!initFDTD()) return;
            }
            
            log('\n=== Initializing Gaussian pulse at center ===');
            FDTD.clearField();
            
            // Strategy: Use CW source for a few steps to inject initial pulse, then disable it
            const centerX = worldSize * 0.5;
            const centerY = worldSize * 0.5;
            const sigma = 20;  // nm (spatial width - wider for visibility)
            const amp = 20.0;  // Strong amplitude
            
            log(`Gaussian pulse: σ=${sigma}nm, k=${k.toFixed(4)}/nm, amp=${amp}`);
            log('Injecting pulse via CW source (50 steps)...');
            
            // Set CW source
            FDTD.setCWSource({
                x: centerX,
                y: centerY,
                amplitude: amp,
                omega: omega,
                width: sigma
            });
            
            // Run 50 steps to build up strong initial pulse
            document.getElementById('status').textContent = 'Injecting pulse...';
            
            setTimeout(() => {
                FDTD.step(50);
                
                // Disable source
                FDTD.setCWSource({ 
                    x: centerX, 
                    y: centerY, 
                    amplitude: 0, 
                    omega: omega, 
                    width: sigma 
                });
                
                currentStep = 50;
                document.getElementById('status').textContent = `Step ${currentStep}`;
                log('Pulse injected (50 steps). Source now disabled.');
                log('Console should show amp=0 and "(9-point stencil)".');
                log('With 9-point stencil, wave should expand as CIRCLE, not square!');
                log('Click "Run to 1000/2000" and watch - should stay circular.');
                drawField();
            }, 50);
        }
        
        function step() {
            if (!initialized) {
                log('ERROR: Not initialized. Click "Initialize Pulse" first.');
                return;
            }
            FDTD.step(10);
            currentStep += 10;
            document.getElementById('status').textContent = `Step ${currentStep}`;
            drawField();
            log(`Advanced to step ${currentStep}`);
        }
        
        function runTo(targetStep) {
            if (!initialized) {
                log('ERROR: Not initialized. Click "Initialize Pulse" first.');
                return;
            }
            if (targetStep <= currentStep) {
                log(`Already at step ${currentStep} (target ${targetStep})`);
                return;
            }
            const nSteps = targetStep - currentStep;
            log(`\nRunning ${nSteps} steps: ${currentStep} → ${targetStep}...`);
            document.getElementById('status').textContent = `Running to ${targetStep}...`;
            
            setTimeout(() => {
                FDTD.step(nSteps);
                currentStep = targetStep;
                document.getElementById('status').textContent = `Step ${currentStep}`;
                drawField();
                log(`Done. Now at step ${currentStep}.`);
            }, 50);
        }
        
        function drawField() {
            FDTD.syncCPU();
            const ctx = document.getElementById('psi2Canvas').getContext('2d');
            const img = ctx.createImageData(NX, NY);
            
            let maxPsi2 = 0;
            let totalPsi2 = 0;
            
            // First pass: find max
            for (let iy = 0; iy < NY; iy++) {
                for (let ix = 0; ix < NX; ix++) {
                    const x = worldSize * (ix + 0.5) / NX;
                    const y = worldSize * (NY - iy - 0.5) / NY;  // flip Y
                    const psi = FDTD.readPsi(x, y);
                    maxPsi2 = Math.max(maxPsi2, psi.psi2);
                    totalPsi2 += psi.psi2;
                }
            }
            
            // Second pass: draw with sqrt scaling for visibility
            for (let iy = 0; iy < NY; iy++) {
                for (let ix = 0; ix < NX; ix++) {
                    const x = worldSize * (ix + 0.5) / NX;
                    const y = worldSize * (NY - iy - 0.5) / NY;
                    const psi = FDTD.readPsi(x, y);
                    
                    const idx = (iy * NX + ix) * 4;
                    const normalized = Math.sqrt(psi.psi2 / (maxPsi2 || 1));
                    const brightness = Math.floor(normalized * 255);
                    img.data[idx] = brightness;
                    img.data[idx+1] = brightness;
                    img.data[idx+2] = brightness;
                    img.data[idx+3] = 255;
                }
            }
            
            ctx.putImageData(img, 0, 0);
        }
        
        function analyzeField() {
            if (!initialized) return;
            
            log(`\n=== Analyzing field at step ${currentStep} ===`);
            log('With 9-point stencil, expect isotropy ratio <1.2 and circular (not square) wavefront');
            const centerX = worldSize * 0.5;
            const centerY = worldSize * 0.5;
            
            const dx = worldSize / NX;
            const testRadii = [20*dx, 30*dx, 40*dx];
            const angles = [0, 45, 90, 135, 180, 225, 270, 315];
            
            for (const r of testRadii) {
                let psi2Values = [];
                for (const a of angles) {
                    const rad = a * Math.PI / 180;
                    const x = centerX + r * Math.cos(rad);
                    const y = centerY + r * Math.sin(rad);
                    const psi = FDTD.readPsi(x, y);
                    psi2Values.push(psi.psi2);
                }
                
                const maxP = Math.max(...psi2Values);
                const minP = Math.min(...psi2Values.filter(v => v > 0));
                const avgP = psi2Values.reduce((a,b)=>a+b,0) / psi2Values.length;
                const ratio = minP > 0 ? (maxP / minP) : Infinity;
                
                log(`Radius = ${r.toFixed(1)} nm:`);
                log(`  |ψ|²: ${psi2Values.map(v => v.toExponential(2)).join(', ')}`);
                log(`  avg=${avgP.toExponential(2)}, ratio=${ratio.toFixed(2)} ${ratio < 3 ? '✓' : '✗'}`);
            }
        }
        
        window.onload = () => {
            log('Ready. Click "Initialize Pulse" to start.');
        };
    </script>
</body>
</html>
