<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>FDTD Test - Single Point Source</title>
    <style>
        body { 
            margin: 20px; 
            font-family: monospace; 
            background: #1e1e1e; 
            color: #d4d4d4;
        }
        canvas { 
            border: 1px solid #444; 
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        #log { 
            margin-top: 20px; 
            white-space: pre; 
            font-size: 11px;
            max-height: 400px;
            overflow-y: auto;
            background: #252526;
            padding: 10px;
            border: 1px solid #444;
        }
        button {
            padding: 8px 16px;
            margin: 5px;
            font-size: 14px;
            cursor: pointer;
        }
        .stats {
            background: #252526;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #444;
        }
    </style>
</head>
<body>
    <h2>FDTD Minimal Test: Single CW Point Source in Free Space (9-Point Stencil)</h2>
    <div class="stats">
        <div>Grid: <span id="gridInfo">-</span></div>
        <div>Physics: <span id="physicsInfo">-</span></div>
        <div>Steps: <span id="stepsInfo">0</span></div>
        <div>Status: <span id="status">initializing...</span></div>
    </div>
    <button onclick="runTest()">Run Test (500 steps)</button>
    <button onclick="analyzeField()">Analyze Field</button>
    <button onclick="clearLog()">Clear Log</button>
    <br><br>
    <canvas id="reCanvas" width="256" height="256"></canvas>
    <canvas id="imCanvas" width="256" height="256"></canvas>
    <canvas id="psi2Canvas" width="256" height="256"></canvas>
    <div style="font-size: 11px; margin-top: 5px;">
        Re(ψ) | Im(ψ) | |ψ|²
    </div>
    <div id="log"></div>

    <script src="js/fdtd-solver.js"></script>
    <script>
        const NX = 128;
        const NY = 128;
        const worldSize = 400;  // 400 nm square
        
        // Physics for electron at λ=100nm
        const lambda = 100;  // nm
        const k = 2 * Math.PI / lambda;
        const hbar = 1.054e-25;  // nm²·kg/ns
        const mElectron = 9.109e-31;  // kg
        const omega = hbar * k * k / (2 * mElectron);
        
        let initialized = false;
        
        function log(msg) {
            const logDiv = document.getElementById('log');
            logDiv.textContent += msg + '\n';
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        function clearLog() {
            document.getElementById('log').textContent = '';
        }
        
        function initFDTD() {
            log('=== Initializing FDTD ===');
            const ok = FDTD.init({
                nx: NX,
                ny: NY,
                worldBounds: {
                    xMin: 0,
                    xMax: worldSize,
                    yMin: 0,
                    yMax: worldSize
                },
                particleMass: mElectron,
                hbar: hbar,
                abcWidth: 15  // narrow ABC for test
            });
            
            if (!ok) {
                log('ERROR: FDTD init failed');
                return false;
            }
            
            // Build empty potential (free space)
            FDTD.buildPotential({
                wallX: worldSize * 0.5,
                wallWidth: 5,
                slit1Y: worldSize * 0.5,
                slit2Y: worldSize * 0.5,
                slitWidth: 10,
                slit1Open: false,
                slit2Open: false
            });
            
            // Single CW point source at grid center
            log('Setting CW source at grid center...');
            FDTD.clearField();
            const centerX = worldSize * 0.5;
            const centerY = worldSize * 0.5;
            FDTD.setCWSource({
                x: centerX,
                y: centerY,
                amplitude: 0.1,
                omega: omega,
                width: 2.0
            });
            
            const info = FDTD.getGridInfo();
            document.getElementById('gridInfo').textContent = 
                `${info.nx}×${info.ny}, dx=${info.dx.toFixed(3)}, dy=${info.dy.toFixed(3)}, dt=${info.dt.toExponential(2)}`;
            document.getElementById('physicsInfo').textContent = 
                `λ=${lambda}nm, k=${k.toFixed(4)}/nm, ω=${omega.toExponential(2)}rad/ns, k·dx=${(k*info.dx).toFixed(3)}`;
            
            initialized = true;
            log('FDTD initialized successfully');
            return true;
        }
        
        function runTest() {
            if (!initialized) {
                if (!initFDTD()) return;
            }
            
            log('\n=== Running 500 time steps ===');
            log('NOTE: CW sources inject energy EVERY step (continuous wave)');
            log('This creates standing waves, NOT outgoing pulses!');
            log('For pure 1/r² falloff, need to turn off source after initial pulse.');
            document.getElementById('status').textContent = 'running...';
            
            FDTD.step(500);
            FDTD.syncCPU();
            
            document.getElementById('stepsInfo').textContent = '500';
            document.getElementById('status').textContent = 'ready';
            
            log('Done. Drawing field...');
            drawField();
            analyzeField();
        }
        
        function drawField() {
            const reCtx = document.getElementById('reCanvas').getContext('2d');
            const imCtx = document.getElementById('imCanvas').getContext('2d');
            const psi2Ctx = document.getElementById('psi2Canvas').getContext('2d');
            
            const reImg = reCtx.createImageData(NX, NY);
            const imImg = imCtx.createImageData(NX, NY);
            const psi2Img = psi2Ctx.createImageData(NX, NY);
            
            let maxRe = 0, maxIm = 0, maxPsi2 = 0;
            
            // First pass: find max values
            for (let iy = 0; iy < NY; iy++) {
                for (let ix = 0; ix < NX; ix++) {
                    const x = worldSize * (ix + 0.5) / NX;
                    const y = worldSize * (NY - iy - 0.5) / NY;  // flip Y
                    const psi = FDTD.readPsi(x, y);
                    maxRe = Math.max(maxRe, Math.abs(psi.real));
                    maxIm = Math.max(maxIm, Math.abs(psi.imag));
                    maxPsi2 = Math.max(maxPsi2, psi.psi2);
                }
            }
            
            log(`Max values: Re=${maxRe.toExponential(2)}, Im=${maxIm.toExponential(2)}, Psi2=${maxPsi2.toExponential(2)}`);
            
            // Second pass: draw with normalization
            for (let iy = 0; iy < NY; iy++) {
                for (let ix = 0; ix < NX; ix++) {
                    const x = worldSize * (ix + 0.5) / NX;
                    const y = worldSize * (NY - iy - 0.5) / NY;
                    const psi = FDTD.readPsi(x, y);
                    
                    const idx = (iy * NX + ix) * 4;
                    
                    // Re: red=positive, blue=negative
                    const reNorm = psi.real / (maxRe || 1);
                    reImg.data[idx] = reNorm > 0 ? Math.floor(reNorm * 255) : 0;
                    reImg.data[idx+1] = 0;
                    reImg.data[idx+2] = reNorm < 0 ? Math.floor(-reNorm * 255) : 0;
                    reImg.data[idx+3] = 255;
                    
                    // Im: red=positive, blue=negative
                    const imNorm = psi.imag / (maxIm || 1);
                    imImg.data[idx] = imNorm > 0 ? Math.floor(imNorm * 255) : 0;
                    imImg.data[idx+1] = 0;
                    imImg.data[idx+2] = imNorm < 0 ? Math.floor(-imNorm * 255) : 0;
                    imImg.data[idx+3] = 255;
                    
                    // Psi2: grayscale
                    const p2Norm = Math.sqrt(psi.psi2 / (maxPsi2 || 1));
                    const gray = Math.floor(p2Norm * 255);
                    psi2Img.data[idx] = gray;
                    psi2Img.data[idx+1] = gray;
                    psi2Img.data[idx+2] = gray;
                    psi2Img.data[idx+3] = 255;
                }
            }
            
            reCtx.putImageData(reImg, 0, 0);
            imCtx.putImageData(imImg, 0, 0);
            psi2Ctx.putImageData(psi2Img, 0, 0);
        }
        
        function analyzeField() {
            if (!initialized) {
                log('ERROR: FDTD not initialized');
                return;
            }
            
            log('\n=== Analyzing field isotropy ===');
            const centerX = worldSize * 0.5;
            const centerY = worldSize * 0.5;
            
            // Test at multiple radii
            const dx = worldSize / NX;
            const testRadii = [10*dx, 20*dx, 30*dx, 40*dx];
            const angles = [0, 45, 90, 135, 180, 225, 270, 315];
            
            for (const r of testRadii) {
                let psi2Values = [];
                for (const a of angles) {
                    const rad = a * Math.PI / 180;
                    const x = centerX + r * Math.cos(rad);
                    const y = centerY + r * Math.sin(rad);
                    const psi = FDTD.readPsi(x, y);
                    psi2Values.push(psi.psi2);
                }
                
                const maxP = Math.max(...psi2Values);
                const minP = Math.min(...psi2Values.filter(v => v > 0));
                const avgP = psi2Values.reduce((a,b)=>a+b,0) / psi2Values.length;
                const ratio = minP > 0 ? (maxP / minP) : Infinity;
                
                log(`\nRadius = ${r.toFixed(1)} nm (${(r/dx).toFixed(1)} cells):`);
                log(`  |ψ|² values: ${psi2Values.map(v => v.toExponential(2)).join(', ')}`);
                log(`  avg=${avgP.toExponential(2)}, max=${maxP.toExponential(2)}, min=${minP.toExponential(2)}`);
                log(`  Isotropy ratio (max/min) = ${ratio.toFixed(2)} ${ratio < 3 ? '✓' : '✗'}`);
                
                // Check 1/r² falloff
                if (r === testRadii[0]) {
                    log(`  Expected 1/r² falloff baseline`);
                } else {
                    const r0 = testRadii[0];
                    const psi2_0 = psi2Values.reduce((a,b)=>a+b,0) / psi2Values.length;
                    const expectedRatio = (r / r0) ** 2;
                    const actualRatio = avgP > 0 ? psi2_0 / avgP : 0;
                    log(`  1/r² check: expected ratio ${expectedRatio.toFixed(2)}, actual ${actualRatio.toFixed(2)} ${Math.abs(actualRatio/expectedRatio - 1) < 0.3 ? '✓' : '✗'}`);
                }
            }
        }
        
        // Auto-init on load
        window.onload = () => {
            log('Ready. Click "Run Test" to start.');
        };
    </script>
</body>
</html>
