<!DOCTYPE html>
<html>
<head>
   <meta charset="UTF-8">
   <title>GPU FFT Minimal 1D Test</title>
   <style>
      body { font-family: monospace; margin: 20px; }
      pre { background: #f0f0f0; padding: 10px; overflow: auto; max-height: 500px; }
      button { padding: 10px 20px; margin: 5px; }
   </style>
</head>
<body>
   <h1>GPU FFT Minimal 1D Test (Texture Read/Write)</h1>
   <button onclick="testTextureRWD()">Test Texture R/W</button>
   <button onclick="testGPU1D()">Test GPU 1D FFT (8 samples)</button>
   <pre id="log"></pre>

   <script src="js/gpu-fft.js"></script>
   <script>
      const logEl = document.getElementById('log');
      let lines = [];
      
      function log(msg) {
         lines.push(msg);
         logEl.textContent = lines.join('\n');
         console.log(msg);
      }
      
      function testTextureRWD() {
         log('===== Texture Read/Write Diagnostic =====');
         
         if (!GPUFFT.init()) {
            log('ERROR: Failed to initialize GPU FFT');
            return;
         }
         
         const gl = GPUFFT.getContext();
         if (!gl) {
            log('ERROR: GPU not initialized');
            return;
         }
         
         const N = 8;
         const size = 4;  // 4x4 texture
         
         // Create test data: simple incrementing pattern
         const testData = new Float32Array(size * size * 4);
         for (let i = 0; i < size*size; i++) {
            testData[i*4] = i % 10;  // Re
            testData[i*4+1] = (i % 10) * 0.1;  // Im
            testData[i*4+2] = 0;
            testData[i*4+3] = 1;
         }
         
         log(`Created test data (${size}x${size})`);
         log('First 4 values (Re, Im):');
         for (let i = 0; i < 4; i++) {
            log(`  [${i}]: ${testData[i*4].toFixed(1)}, ${testData[i*4+1].toFixed(2)}`);
         }
         
         // Upload to texture
         const tex = GPUFFT.createFloatTexture(size, size);
         gl.bindTexture(gl.TEXTURE_2D, tex);
         gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, size, size, 0, gl.RGBA, gl.FLOAT, testData);
         
         // Create FBO and read back
         const fbo = GPUFFT.createFramebuffer(tex);
         gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
         const readBack = new Float32Array(size * size * 4);
         gl.readPixels(0, 0, size, size, gl.RGBA, gl.FLOAT, readBack);
         gl.bindFramebuffer(gl.FRAMEBUFFER, null);
         
         log('Read back from texture:');
         let match = true;
         for (let i = 0; i < 4; i++) {
            const reMatch = Math.abs(testData[i*4] - readBack[i*4]) < 0.01;
            const imMatch = Math.abs(testData[i*4+1] - readBack[i*4+1]) < 0.001;
            if (!reMatch || !imMatch) match = false;
            log(`  [${i}]: ${readBack[i*4].toFixed(1)}, ${readBack[i*4+1].toFixed(2)} ${reMatch && imMatch ? '✓' : '✗'}`);
         }
         
         if (match) {
            log('✓ Texture R/W working correctly');
         } else {
            log('✗ Texture R/W has issues');
         }
         
         gl.deleteFramebuffer(fbo);
         gl.deleteTexture(tex);
      }
      
      function testGPU1D() {
         log('===== GPU 1D FFT Test (8 complex values) =====');
         
         if (!GPUFFT.init()) {
            log('ERROR: Failed to initialize GPU FFT');
            return;
         }
         
         const gl = GPUFFT.getContext();
         if (!gl) {
            log('ERROR: GPU not initialized');
            return;
         }
         
         const N = 8;
         // 8x1 texture (one row of 8 pixels, each with (Re, Im))
         const texSize = 8;
         const texHeight = 1;
         
         // Create constant input: 1.0 + i*0.0 repeated 8 times
         const inputData = new Float32Array(texSize * 4);
         for (let i = 0; i < texSize; i++) {
            inputData[i*4] = 1.0;
            inputData[i*4+1] = 0.0;
            inputData[i*4+2] = 0.0;
            inputData[i*4+3] = 1.0;
         }
         
         log(`Input: 8 constant values (Re=1, Im=0)`);
         
         // We can't easily test just 8 pixels with the current GPU FFT
         // Let's use a small 8x8 texture instead
         const size = 8;
         const testData = new Float32Array(size * size * 4);
         
         // Fill ALL with constant 1.0 (best test for FFT/IFFT roundtrip)
         for (let y = 0; y < size; y++) {
            for (let x = 0; x < size; x++) {
               const idx = (y * size + x) * 4;
               testData[idx] = 1.0;  // Re
               testData[idx+1] = 0.0;  // Im
               testData[idx+2] = 0.0;
               testData[idx+3] = 1.0;
            }
         }
         
         log(`Created 8x8 texture, all pixels = 1.0 (constant signal)`);
         
         const tex = GPUFFT.createFloatTexture(size, size);
         gl.bindTexture(gl.TEXTURE_2D, tex);
         gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, size, size, 0, gl.RGBA, gl.FLOAT, testData);
         
         // Do GPU FFT
         log('Running GPU FFT (forward)...');
         const start = performance.now();
         GPUFFT.fft2D(tex, size, size, false, false);  // forward, with bit-reversal
         const time = performance.now() - start;
         
         // Read result
         const fbo = GPUFFT.createFramebuffer(tex);
         gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
         const fftResult = new Float32Array(size * size * 4);
         gl.readPixels(0, 0, size, size, gl.RGBA, gl.FLOAT, fftResult);
         gl.bindFramebuffer(gl.FRAMEBUFFER, null);
         
         log(`FFT took ${time.toFixed(2)}ms`);
         
         // Check DC component (pixel 0,0)
         const dcRe = fftResult[0];
         const dcIm = fftResult[1];
         const dcMag = Math.sqrt(dcRe*dcRe + dcIm*dcIm);
         const expectedDC = size * size;  // DC for constant signal  = total sum
         log(`FFT DC at (0,0) (should be ${expectedDC}): Re=${dcRe.toExponential(3)} Mag=${dcMag.toExponential(3)}`);
         
         // For constant input, all off-diagonal should be near zero
         log('FFT off-diagonal values (should be ~0):');
         for (let y = 0; y < 3; y++) {
            for (let x = 1; x < 3; x++) {  // Skip (0,0)
               const idx = (y * size + x) * 4;
               const re = fftResult[idx];
               const mag = Math.sqrt(re*re + fftResult[idx+1]*fftResult[idx+1]);
               log(`  [${y},${x}]: ${mag.toExponential(3)}`);
            }
         }
         
         // IFFT
         log('Running GPU IFFT (inverse)...');
         GPUFFT.fft2D(tex, size, size, true, false);  // inverse, WITH bit-reversal (BR needed for IFFT too)
         
         gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
         const ifftResult = new Float32Array(size * size * 4);
         gl.readPixels(0, 0, size, size, gl.RGBA, gl.FLOAT, ifftResult);
         gl.bindFramebuffer(gl.FRAMEBUFFER, null);
         
         log(`Expected IFFT: all pixels = 1.0`);
         log('Actual IFFT first few pixels:');
         for (let i = 0; i < 5; i++) {
            const idx = i * 4;
            const re = ifftResult[idx];
            const im = ifftResult[idx+1];
            const expected = 1.0;
            const err = Math.abs(re - expected);
            log(`  [${i}]: Re=${re.toExponential(3)} Im=${im.toExponential(3)} (err=${err.toExponential(3)})`);
         }
         
         // Check roundtrip error across all pixels
         let maxErr = 0;
         let sumErr = 0;
         for (let i = 0; i < size * size; i++) {
            const idx = i * 4;
            const expRe = 1.0;
            const actualRe = ifftResult[idx];
            const err = Math.abs(expRe - actualRe);
            maxErr = Math.max(maxErr, err);
            sumErr += err;
         }
         const avgErr = sumErr / (size * size);
         log(`Roundtrip stats: max_err=${maxErr.toExponential(3)}, avg_err=${avgErr.toExponential(3)}`);
         
         gl.deleteFramebuffer(fbo);
         gl.deleteTexture(tex);
      }
      
      window.onload = () => {
         if (!GPUFFT.init()) {
            log('ERROR: GPU FFT init failed');
         } else {
            log('GPU FFT initialized');
            testTextureRWD();
         }
      };
   </script>
</body>
</html>
