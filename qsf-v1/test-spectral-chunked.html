<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Spectral Solver - Non-Blocking</title>
    <style>
        body { 
            margin: 20px; 
            font-family: monospace; 
            background: #1e1e1e; 
            color: #d4d4d4;
        }
        canvas { 
            border: 1px solid #444; 
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        #log { 
            margin-top: 20px; 
            white-space: pre; 
            font-size: 11px;
            max-height: 400px;
            overflow-y: auto;
            background: #252526;
            padding: 10px;
            border: 1px solid #444;
        }
        button {
            padding: 8px 16px;
            margin: 5px;
            font-size: 14px;
            cursor: pointer;
            background: #0e639c;
            color: white;
            border: none;
            border-radius: 3px;
        }
        button:hover {
            background: #1177bb;
        }
        button:disabled {
            background: #555;
            cursor: not-allowed;
        }
        .stats {
            background: #252526;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #444;
        }
        .highlight {
            color: #4CAF50;
            font-weight: bold;
        }
        #progress {
            width: 100%;
            height: 20px;
            background: #252526;
            border: 1px solid #444;
            margin: 10px 0;
        }
        #progressBar {
            height: 100%;
            background: #0e639c;
            width: 0%;
            transition: width 0.1s;
        }
    </style>
</head>
<body>
    <h2>Spectral Split-Step Solver - Non-Blocking (Chunked FFT)</h2>
    <div class="stats">
        <div>Grid: <span id="gridInfo">-</span></div>
        <div>Physics: <span id="physicsInfo">-</span></div>
        <div>Status: <span id="status">initializing...</span></div>
        <div class="highlight">✓ Exact Laplacian (zero dispersion)</div>
        <div class="highlight">✓ Perfect circular wavefronts</div>
        <div class="highlight">✓ Non-blocking (UI stays responsive)</div>
    </div>
    <div id="progress"><div id="progressBar"></div></div>
    <button id="btnInit" onclick="initPulse()">Initialize Pulse</button>
    <button id="btnRun" onclick="startRun()" disabled>Start Continuous Run</button>
    <button id="btnStop" onclick="stopRun()" disabled>Stop</button>
    <button id="btnStep" onclick="stepChunk()" disabled>Step +50</button>
    <button onclick="analyzeField()">Analyze</button>
    <button onclick="clearLog()">Clear Log</button>
    <br><br>
    <canvas id="psi2Canvas" width="512" height="512"></canvas>
    <div style="font-size: 11px; margin-top: 5px;">
        |ψ|² - 256×256 spectral grid (perfect circles!)
    </div>
    <div id="log"></div>

    <script src="js/fft2d.js"></script>
    <script src="js/spectral-solver-simple.js"></script>
    <script>
        const NX = 256;
        const NY = 256;
        const worldSize = 800;
        
        const lambda = 200;
        const k = 2 * Math.PI / lambda;
        const hbar = 1.054e-25;
        const mElectron = 9.109e-31;
        const omega = hbar * k * k / (2 * mElectron);
        
        let initialized = false;
        let currentStep = 0;
        let isRunning = false;
        let targetStep = 0;
        let lastDrawTime = 0;
        
        function log(msg) {
            const logDiv = document.getElementById('log');
            logDiv.textContent += msg + '\n';
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        function clearLog() {
            document.getElementById('log').textContent = '';
        }
        
        function updateProgress() {
            if (targetStep > currentStep) {
                const pct = 100 * currentStep / targetStep;
                document.getElementById('progressBar').style.width = pct + '%';
            } else {
                document.getElementById('progressBar').style.width = '0%';
            }
        }
        
        function initSolver() {
            log('=== Initializing Spectral Solver ===');
            const ok = SpectralSimple.init({
                nx: NX,
                ny: NY,
                worldBounds: {
                    xMin: 0,
                    xMax: worldSize,
                    yMin: 0,
                    yMax: worldSize
                },
                particleMass: mElectron,
                hbar: hbar,
                abcWidth: 20
            });
            
            if (!ok) {
                log('ERROR: Init failed');
                return false;
            }
            
            SpectralSimple.buildPotential({});
            
            const info = SpectralSimple.getGridInfo();
            document.getElementById('gridInfo').textContent = 
                `${info.nx}×${info.ny}, dx=${info.dx.toFixed(3)}, dt=${info.dt.toExponential(2)}`;
            document.getElementById('physicsInfo').textContent = 
                `λ=${lambda}nm, k=${k.toFixed(4)}/nm, k·dx=${(k*info.dx).toFixed(3)}`;
            
            initialized = true;
            log('Spectral solver initialized');
            log('Using CPU FFT withchunking - should not freeze!');
            return true;
        }
        
        function initPulse() {
            document.getElementById('btnInit').disabled = true;
            
            if (!initialized) {
                if (!initSolver()) return;
            }
            
            log('\n=== Initializing pulse ===');
            SpectralSimple.clearField();
            
            const centerX = worldSize * 0.5;
            const centerY = worldSize * 0.5;
            const sigma = 20;
            const amp = 20.0;
            
            log(`Pulse: σ=${sigma}nm, amp=${amp}`);
            log('Injecting (50 steps)...');
            
            document.getElementById('status').textContent = 'Injecting...';
            
            setTimeout(() => {
                SpectralSimple.setCWSource({
                    x: centerX,
                    y: centerY,
                    amplitude: amp,
                    omega: omega,
                    width: sigma
                });
                
                SpectralSimple.step(50);
                
                SpectralSimple.setCWSource({
                    x: centerX,
                    y: centerY,
                    amplitude: 0,
                    omega: omega,
                    width: sigma
                });
                
                currentStep = 50;
                document.getElementById('status').textContent = `Step ${currentStep}`;
                log('Pulse ready. Click "Start Continuous Run"');
                drawField();
                
                document.getElementById('btnInit').disabled = false;
                document.getElementById('btnRun').disabled = false;
                document.getElementById('btnStep').disabled = false;
            }, 100);
        }
        
        function stepChunk() {
            if (!initialized) return;
            
            const chunkSize = 50;
            const t0 = performance.now();
            SpectralSimple.step(chunkSize);
            const t1 = performance.now();
            
            currentStep += chunkSize;
            document.getElementById('status').textContent = `Step ${currentStep}`;
            
            const now = performance.now();
            if (now - lastDrawTime > 200) {  // Draw every 200ms
                drawField();
                lastDrawTime = now;
            }
            
            log(`Step ${currentStep} (${(t1-t0).toFixed(1)}ms for ${chunkSize} steps)`);
        }
        
        function startRun() {
            if (!initialized || isRunning) return;
            
            isRunning = true;
            targetStep = currentStep + 100000;  // Run "forever"
            document.getElementById('btnRun').disabled = true;
            document.getElementById('btnStop').disabled = false;
            document.getElementById('btnStep').disabled = true;
            
            log('\n=== Starting continuous run ===');
            log('Watch for perfect  circular expansion!');
            runLoop();
        }
        
        function stopRun() {
            isRunning = false;
            targetStep = currentStep;
            document.getElementById('btnRun').disabled = false;
            document.getElementById('btnStop').disabled = true;
            document.getElementById('btnStep').disabled = false;
            log('Stopped at step ' + currentStep);
            updateProgress();
        }
        
        function runLoop() {
            if (!isRunning || currentStep >= targetStep) {
                stopRun();
                return;
            }
            
            // Do small chunk of work
            const chunkSize = 10;  // Smaller chunks for smooth UI
            SpectralSimple.step(chunkSize);
            currentStep += chunkSize;
            
            // Update display
            const now = performance.now();
            if (now - lastDrawTime > 100) {  // Draw every 100ms
                drawField();
                lastDrawTime = now;
                document.getElementById('status').textContent = 
                    `Step ${currentStep} (running...)`;
            }
            
            updateProgress();
            
            // Continue loop
            requestAnimationFrame(runLoop);
        }
        
        function drawField() {
            SpectralSimple.syncCPU();
            const ctx = document.getElementById('psi2Canvas').getContext('2d');
            const img = ctx.createImageData(NX, NY);
            
            let maxPsi2 = 0;
            
            for (let iy = 0; iy < NY; iy++) {
                for (let ix = 0; ix < NX; ix++) {
                    const x = worldSize * (ix + 0.5) / NX;
                    const y = worldSize * (NY - iy - 0.5) / NY;
                    const psi = SpectralSimple.readPsi(x, y);
                    maxPsi2 = Math.max(maxPsi2, psi.psi2);
                }
            }
            
            for (let iy = 0; iy < NY; iy++) {
                for (let ix = 0; ix < NX; ix++) {
                    const x = worldSize * (ix + 0.5) / NX;
                    const y = worldSize * (NY - iy - 0.5) / NY;
                    const psi = SpectralSimple.readPsi(x, y);
                    
                    const idx = (iy * NX + ix) * 4;
                    const normalized = Math.sqrt(psi.psi2 / (maxPsi2 || 1));
                    const brightness = Math.floor(normalized * 255);
                    img.data[idx] = brightness;
                    img.data[idx+1] = brightness;
                    img.data[idx+2] = brightness;
                    img.data[idx+3] = 255;
                }
            }
            
            ctx.putImageData(img, 0, 0);
        }
        
        function analyzeField() {
            if (!initialized) return;
            
            log(`\n=== Isotropy at step ${currentStep} ===`);
            const centerX = worldSize * 0.5;
            const centerY = worldSize * 0.5;
            
            const dx = worldSize / NX;
            const testRadii = [30*dx, 50*dx, 70*dx, 90*dx];
            const angles = [0, 45, 90, 135, 180, 225, 270, 315];
            
            for (const r of testRadii) {
                let psi2Values = [];
                for (const a of angles) {
                    const rad = a * Math.PI / 180;
                    const x = centerX + r * Math.cos(rad);
                    const y = centerY + r * Math.sin(rad);
                    const psi = SpectralSimple.readPsi(x, y);
                    psi2Values.push(psi.psi2);
                }
                
                const maxP = Math.max(...psi2Values);
                const minP = Math.min(...psi2Values.filter(v => v > 0));
                const ratio = minP > 0 ? (maxP / minP) : Infinity;
                
                const status = ratio < 1.1 ? '✓✓✓ PERFECT' : (ratio < 1.2 ? '✓✓ Excellent' : '✓');
                
                log(`r=${r.toFixed(1)}nm: ratio=${ratio.toFixed(3)} ${status}`);
            }
        }
        
        window.onload = () => {
            clearLog();
            log('=== Spectral Solver (Non-Blocking) ===');
            log('Click "Initialize Pulse" to start.');
            log('Then "Start Continuous Run" to watch wave propagate.');
            log('Wave will be perfectly circular!');
        };
    </script>
</body>
</html>
