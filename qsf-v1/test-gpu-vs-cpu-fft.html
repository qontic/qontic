<!DOCTYPE html>
<html>
<head>
   <meta charset="UTF-8">
   <title>GPU FFT vs CPU Reference Comparison</title>
   <style>
      body { font-family: monospace; margin: 20px; background: #f5f5f5; }
      pre { background: #fff; padding: 15px; border-left: 4px solid #0066cc; overflow: auto; max-height: 600px; }
      button { padding: 10px 20px; margin: 5px; background: #0066cc; color: white; border: none; cursor: pointer; }
      button:hover { background: #0052a3; }
      table { border-collapse: collapse; margin: 10px 0; background: #fff; }
      th, td { border: 1px solid #ddd; padding: 8px; text-align: right; }
      th { background: #f0f0f0; font-weight: bold; }
      td.metric { text-align: left; }
      .pass { color: #00aa00; font-weight: bold; }
      .fail { color: #aa0000; font-weight: bold; }
   </style>
</head>
<body>
   <h1>GPU FFT vs CPU Reference - Comparison Test</h1>
   <p>Validates GPU FFT produces same results as CPU reference implementation</p>
   <button onclick="runComparison()">Run Comparison</button>
   <button onclick="clearLog()">Clear</button>
   <pre id="log"></pre>

   <script src="js/gpu-fft.js"></script>
   <script>
      // CPU Reference FFT (from test-cpu-fft-ref.html)
      function fft1D(input, inverse = false) {
         const N = input.length / 2;  // Number of complex values
         if (N === 1) return input;
         if ((N & (N - 1)) !== 0) throw new Error('N must be power of 2');
         
         // Bit-reverse permutation
         const bits = Math.log2(N);
         const reversed = new Float32Array(input.length);
         for (let i = 0; i < N; i++) {
            let j = 0;
            for (let k = 0; k < bits; k++) {
               if (i & (1 << k)) j |= 1 << (bits - 1 - k);
            }
            reversed[j*2] = input[i*2];
            reversed[j*2+1] = input[i*2+1];
         }
         
         // Cooley-Tukey butterflies
         let working = reversed.slice();
         for (let stage = 0; stage < bits; stage++) {
            const spanSize = 1 << (stage + 1);
            const halfSpan = spanSize / 2;
            let angleScale = -2 * Math.PI / spanSize;
            if (inverse) angleScale = -angleScale;
            
            for (let block = 0; block < N; block += spanSize) {
               for (let i = 0; i < halfSpan; i++) {
                  const idx1 = block + i;
                  const idx2 = block + i + halfSpan;
                  
                  const angle = angleScale * i;
                  const wr = Math.cos(angle);
                  const wi = Math.sin(angle);
                  
                  const re2 = working[idx2*2];
                  const im2 = working[idx2*2+1];
                  const tr = re2 * wr - im2 * wi;
                  const ti = re2 * wi + im2 * wr;
                  
                  const re1 = working[idx1*2];
                  const im1 = working[idx1*2+1];
                  
                  working[idx1*2] = re1 + tr;
                  working[idx1*2+1] = im1 + ti;
                  working[idx2*2] = re1 - tr;
                  working[idx2*2+1] = im1 - ti;
               }
            }
         }
         
         if (inverse) {
            for (let i = 0; i < working.length; i++) working[i] /= N;
         }
         
         return working;
      }
      
      const logEl = document.getElementById('log');
      let lines = [];
      
      function log(msg) {
         lines.push(msg);
         logEl.textContent = lines.join('\n');
         console.log(msg);
      }
      
      function clearLog() {
         lines = [];
         logEl.textContent = '';
      }
      
      async function runComparison() {
         clearLog();
         log('='.repeat(70));
         log('GPU FFT vs CPU Reference Comparison');
         log('='.repeat(70));
         
         // Initialize GPU FFT
         log('Initializing GPU FFT...');
         if (!GPUFFT.init()) {
            log('ERROR: Failed to initialize GPU FFT');
            return;
         }
         
         const gl = GPUFFT.getContext();
         if (!gl) {
            log('ERROR: GPU not initialized');
            return;
         }
         log('✓ GPU initialized');
         
         // Test Case 1: Constant signal (best for DC testing)
         {
            log('\nTest 1: Constant Signal (all 1.0)');
            log('-'.repeat(70));
            
            const N = 64;
            const cpuInput = new Float32Array(N * 2);
            for (let i = 0; i < N; i++) {
               cpuInput[i*2 + 0] = 1.0;
               cpuInput[i*2 + 1] = 0.0;
            }
            
            // CPU FFT
            log('Running CPU FFT...');
            const cpuFFT = fft1D(cpuInput, false);
            const cpuDC = Math.sqrt(cpuFFT[0]*cpuFFT[0] + cpuFFT[1]*cpuFFT[1]);
            log(`CPU FFT DC = ${cpuDC.toFixed(1)} (expected: ${N})`);
            
            // GPU FFT
            log('Running GPU FFT...');
            const size = Math.sqrt(N);  // 8x8
            if (size % 1 !== 0) {
               log('Skipping GPU (N not perfect square)');
            } else {
               const gpuData = new Float32Array(size * size * 4);
               for (let i = 0; i < size * size; i++) {
                  gpuData[i*4 + 0] = 1.0;
                  gpuData[i*4 + 1] = 0.0;
                  gpuData[i*4 + 2] = 0.0;
                  gpuData[i*4 + 3] = 1.0;
               }
               
               const tex = GPUFFT.createFloatTexture(size, size);
               gl.bindTexture(gl.TEXTURE_2D, tex);
               gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, size, size, 0, gl.RGBA, gl.FLOAT, gpuData);
               
               GPUFFT.fft2D(tex, size, size, false, false);
               
               const fbo = GPUFFT.createFramebuffer(tex);
               gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
               const gpuFFT = new Float32Array(size * size * 4);
               gl.readPixels(0, 0, size, size, gl.RGBA, gl.FLOAT, gpuFFT);
               gl.bindFramebuffer(gl.FRAMEBUFFER, null);
               
               const gpuDC = Math.sqrt(gpuFFT[0]*gpuFFT[0] + gpuFFT[1]*gpuFFT[1]);
               log(`GPU FFT DC = ${gpuDC.toFixed(1)} (expected: ${N})`);
               
               const dcError = Math.abs(cpuDC - gpuDC);
               log(`DC Error: ${dcError.toExponential(3)} ${dcError < 0.01 ? '✓' : '✗'}`);
               
               gl.deleteFramebuffer(fbo);
               gl.deleteTexture(tex);
            }
         }
         
         // Test Case 2: Roundtrip test
         {
            log('\nTest 2: 1D Constant Signal Roundtrip');
            log('-'.repeat(70));
            
            const N = 256;
            const cpuInput = new Float32Array(N * 2);
            for (let i = 0; i < N; i++) {
               cpuInput[i*2 + 0] = 1.0;
               cpuInput[i*2 + 1] = 0.0;
            }
            
            // CPU roundtrip
            log('CPU: FFT -> IFFT...');
            const cpuFFT = fft1D(cpuInput, false);
            const cpuIFFT = fft1D(cpuFFT, true);
            
            let cpuError = 0;
            for (let i = 0; i < N; i++) {
               cpuError = Math.max(cpuError, Math.abs(cpuInput[i*2] - cpuIFFT[i*2]));
            }
            log(`CPU Roundtrip error: ${cpuError.toExponential(3)}`);
            
            // GPU 1D simulation (place signal in first row of 16x16)
            log('GPU: FFT -> IFFT... (simulated as 1st row of 16×16)');
            const size = 16;
            const gpuData = new Float32Array(size * size * 4);
            // Put 16 values (1D constant signal) in first row
            for (let x = 0; x < 16; x++) {
               const idx = (0 * size + x) * 4;
               gpuData[idx + 0] = 1.0;
               gpuData[idx + 1] = 0.0;
               gpuData[idx + 2] = 0.0;
               gpuData[idx + 3] = 1.0;
            }
            
            const tex = GPUFFT.createFloatTexture(size, size);
            gl.bindTexture(gl.TEXTURE_2D, tex);
            gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, size, size, 0, gl.RGBA, gl.FLOAT, gpuData);
            
            GPUFFT.fft2D(tex, size, size, false, false);
            GPUFFT.fft2D(tex, size, size, true, false);  // inverse, WITH bit-reversal (BR needed for IFFT)
            
            const fbo = GPUFFT.createFramebuffer(tex);
            gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
            const gpuResult = new Float32Array(size * size * 4);
            gl.readPixels(0, 0, size, size, gl.RGBA, gl.FLOAT, gpuResult);
            gl.bindFramebuffer(gl.FRAMEBUFFER, null);
            
            let gpuError = 0;
            for (let x = 0; x < 16; x++) {
               const idx = x * 4;
               const expected = 1.0;
               gpuError = Math.max(gpuError, Math.abs(expected - gpuResult[idx]));
            }
            log(`GPU Roundtrip error (1st row): ${gpuError.toExponential(3)}`);
            
            const rtError = Math.abs(cpuError - gpuError);
            log(`Roundtrip error difference: ${rtError.toExponential(3)}`);
            
            gl.deleteFramebuffer(fbo);
            gl.deleteTexture(tex);
         }
         
         log('\n' + '='.repeat(70));
         log('Comparison Complete');
         log('='.repeat(70));
      }
   </script>
</body>
</html>
