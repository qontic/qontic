<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Spectral Test - Perfect Circular Waves</title>
    <style>
        body { 
            margin: 20px; 
            font-family: monospace; 
            background: #1e1e1e; 
            color: #d4d4d4;
        }
        canvas { 
            border: 1px solid #444; 
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        #log { 
            margin-top: 20px; 
            white-space: pre; 
            font-size: 11px;
            max-height: 400px;
            overflow-y: auto;
            background: #252526;
            padding: 10px;
            border: 1px solid #444;
        }
        button {
            padding: 8px 16px;
            margin: 5px;
            font-size: 14px;
            cursor: pointer;
            background: #0e639c;
            color: white;
            border: none;
            border-radius: 3px;
        }
        button:hover {
            background: #1177bb;
        }
        .stats {
            background: #252526;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #444;
        }
        .highlight {
            color: #4CAF50;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h2>Spectral Split-Step Fourier Solver Test</h2>
    <div class="stats">
        <div>Grid: <span id="gridInfo">-</span></div>
        <div>Physics: <span id="physicsInfo">-</span></div>
        <div>Status: <span id="status">initializing...</span></div>
        <div class="highlight">✓ Zero numerical dispersion (exact Laplacian via FFT)</div>
        <div class="highlight">✓ Perfect circular wavefronts guaranteed</div>
    </div>
    <button onclick="initPulse()">Initialize Pulse</button>
    <button onclick="step()">Step +10</button>
    <button onclick="runTo(100)">Run to 100</button>
    <button onclick="runTo(500)">Run to 500</button>
    <button onclick="runTo(1000)">Run to 1000</button>
    <button onclick="runTo(2000)">Run to 2000</button>
    <button onclick="analyzeField()">Analyze Isotropy</button>
    <button onclick="clearLog()">Clear Log</button>
    <br><br>
    <canvas id="psi2Canvas" width="512" height="512"></canvas>
    <div style="font-size: 11px; margin-top: 5px;">
        |ψ|² (probability density) - 512×512 display of 128×128 grid (CPU FFT, batched execution)
    </div>
    <div id="log"></div>

    <script src="js/fft2d.js"></script>
    <script src="js/spectral-solver-simple.js"></script>
    <script>
        const NX = 128;  // Reduced from 256 for faster CPU FFT
        const NY = 128;
        const worldSize = 800;  // 800 nm square
        
        // Physics for electron at λ=200nm
        const lambda = 200;  // nm
        const k = 2 * Math.PI / lambda;
        const hbar = 1.054e-25;  // nm²·kg/ns
        const mElectron = 9.109e-31;  // kg
        const omega = hbar * k * k / (2 * mElectron);
        
        let initialized = false;
        let currentStep = 0;
        
        function log(msg) {
            const logDiv = document.getElementById('log');
            logDiv.textContent += msg + '\n';
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        function clearLog() {
            document.getElementById('log').textContent = '';
        }
        
        function initSolver() {
            log('=== Initializing Spectral Solver ===');
            const ok = SpectralSimple.init({
                nx: NX,
                ny: NY,
                worldBounds: {
                    xMin: 0,
                    xMax: worldSize,
                    yMin: 0,
                    yMax: worldSize
                },
                particleMass: mElectron,
                hbar: hbar,
                abcWidth: 20
            });
            
            if (!ok) {
                log('ERROR: Spectral solver init failed');
                return false;
            }
            
            // Build empty potential (free space)
            SpectralSimple.buildPotential({});
            
            const info = SpectralSimple.getGridInfo();
            document.getElementById('gridInfo').textContent = 
                `${info.nx}×${info.ny}, dx=${info.dx.toFixed(3)}, dy=${info.dy.toFixed(3)}, dt=${info.dt.toExponential(2)}`;
            document.getElementById('physicsInfo').textContent = 
                `λ=${lambda}nm, k=${k.toFixed(4)}/nm, ω=${omega.toExponential(2)}rad/ns, k·dx=${(k*info.dx).toFixed(3)}`;
            
            initialized = true;
            log('Spectral solver initialized successfully');
            return true;
        }
        
        function initPulse() {
            if (!initialized) {
                if (!initSolver()) return;
            }
            
            log('\n=== Initializing Gaussian pulse at center ===');
            SpectralSimple.clearField();
            
            const centerX = worldSize * 0.5;
            const centerY = worldSize * 0.5;
            const sigma = 20;  // nm
            const amp = 20.0;
            
            log(`Gaussian pulse: σ=${sigma}nm, k=${k.toFixed(4)}/nm, amp=${amp}`);
            log('Injecting pulse via CW source (10 steps)...');
            
            document.getElementById('status').textContent = 'Injecting pulse...';
            
            setTimeout(() => {
                // Set CW source
                SpectralSimple.setCWSource({
                    x: centerX,
                    y: centerY,
                    amplitude: amp,
                    omega: omega,
                    width: sigma
                });
                
                // Run 10 steps to build up pulse (reduced for speed)
                SpectralSimple.step(10);
                
                // Disable source
                SpectralSimple.setCWSource({
                    x: centerX,
                    y: centerY,
                    amplitude: 0,
                    omega: omega,
                    width: sigma
                });
                
                currentStep = 10;
                document.getElementById('status').textContent = `Step ${currentStep}`;
                log('Pulse injected (10 steps). Source disabled.');
                log('✓ With spectral method, wave WILL remain perfectly circular!');
                log('Click "Run to 500/1000" - runs in batches to avoid freezing.');
                drawField();
            }, 50);
        }
        
        function step() {
            if (!initialized) {
                log('ERROR: Not initialized. Click "Initialize Pulse" first.');
                return;
            }
            SpectralSimple.step(10);
            currentStep += 10;
            document.getElementById('status').textContent = `Step ${currentStep}`;
            drawField();
            log(`Advanced to step ${currentStep}`);
        }
        
        function runTo(targetStep) {
            if (!initialized) {
                log('ERROR: Not initialized. Click "Initialize Pulse" first.');
                return;
            }
            if (targetStep <= currentStep) {
                log(`Already at step ${currentStep} (target ${targetStep})`);
                return;
            }
            const totalSteps = targetStep - currentStep;
            log(`\nRunning ${totalSteps} steps: ${currentStep} → ${targetStep}...`);
            log('(Running in batches to avoid freezing browser)');
            document.getElementById('status').textContent = `Running to ${targetStep}...`;
            
            // Run in batches of 50 steps with setTimeout between
            const batchSize = 50;
            let stepsRemaining = totalSteps;
            
            function runBatch() {
                const stepsThisBatch = Math.min(batchSize, stepsRemaining);
                const t0 = performance.now();
                SpectralSimple.step(stepsThisBatch);
                const t1 = performance.now();
                currentStep += stepsThisBatch;
                stepsRemaining -= stepsThisBatch;
                
                const progress = ((totalSteps - stepsRemaining) / totalSteps * 100).toFixed(0);
                document.getElementById('status').textContent = `Running... ${progress}% (${currentStep}/${targetStep})`;
                
                if (stepsRemaining > 0) {
                    setTimeout(runBatch, 10);  // Small delay to keep UI responsive
                } else {
                    document.getElementById('status').textContent = `Step ${currentStep}`;
                    drawField();
                    log(`Done in ${(t1-t0).toFixed(1)}ms total`);
                }
            }
            
            setTimeout(runBatch, 10);
        }
        
        function drawField() {
            SpectralSimple.syncCPU();
            const ctx = document.getElementById('psi2Canvas').getContext('2d');
            const img = ctx.createImageData(NX, NY);
            
            let maxPsi2 = 0;
            
            // First pass: find max
            for (let iy = 0; iy < NY; iy++) {
                for (let ix = 0; ix < NX; ix++) {
                    const x = worldSize * (ix + 0.5) / NX;
                    const y = worldSize * (NY - iy - 0.5) / NY;  // flip Y
                    const psi = SpectralSimple.readPsi(x, y);
                    maxPsi2 = Math.max(maxPsi2, psi.psi2);
                }
            }
            
            // Second pass: draw with sqrt scaling
            for (let iy = 0; iy < NY; iy++) {
                for (let ix = 0; ix < NX; ix++) {
                    const x = worldSize * (ix + 0.5) / NX;
                    const y = worldSize * (NY - iy - 0.5) / NY;
                    const psi = SpectralSimple.readPsi(x, y);
                    
                    const idx = (iy * NX + ix) * 4;
                    const normalized = Math.sqrt(psi.psi2 / (maxPsi2 || 1));
                    const brightness = Math.floor(normalized * 255);
                    img.data[idx] = brightness;
                    img.data[idx+1] = brightness;
                    img.data[idx+2] = brightness;
                    img.data[idx+3] = 255;
                }
            }
            
            ctx.putImageData(img, 0, 0);
        }
        
        function analyzeField() {
            if (!initialized) return;
            
            log(`\n=== Analyzing field isotropy at step ${currentStep} ===`);
            log('Spectral method: Expect isotropy ratio <1.1 (near-perfect circles)');
            const centerX = worldSize * 0.5;
            const centerY = worldSize * 0.5;
            
            const dx = worldSize / NX;
            const testRadii = [20*dx, 30*dx, 40*dx, 50*dx];
            const angles = [0, 45, 90, 135, 180, 225, 270, 315];
            
            for (const r of testRadii) {
                let psi2Values = [];
                for (const a of angles) {
                    const rad = a * Math.PI / 180;
                    const x = centerX + r * Math.cos(rad);
                    const y = centerY + r * Math.sin(rad);
                    const psi = SpectralSimple.readPsi(x, y);
                    psi2Values.push(psi.psi2);
                }
                
                const maxP = Math.max(...psi2Values);
                const minP = Math.min(...psi2Values.filter(v => v > 0));
                const avgP = psi2Values.reduce((a,b)=>a+b,0) / psi2Values.length;
                const ratio = minP > 0 ? (maxP / minP) : Infinity;
                
                const threshold = 1.15;  // Much stricter than 9-point stencil
                const status = ratio < threshold ? '✓✓ EXCELLENT' : (ratio < 1.5 ? '✓ Good' : '✗ Poor');
                
                log(`Radius = ${r.toFixed(1)} nm:`);
                log(`  |ψ|²: ${psi2Values.map(v => v.toExponential(2)).join(', ')}`);
                log(`  avg=${avgP.toExponential(2)}, max=${maxP.toExponential(2)}, min=${minP.toExponential(2)}`);
                log(`  Isotropy ratio = ${ratio.toFixed(3)} ${status}`);
            }
        }
        
        window.onload = () => {
            clearLog();
            log('=== Spectral Split-Step Fourier Method ===');
            log('This method uses exact Laplacian via FFT.');
            log('Wave propagation should be perfectly isotropic (circular wavefronts).');
            log('');
            log('Ready. Click "Initialize Pulse" to start.');
        };
    </script>
</body>
</html>
