<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spectral Solver Test</title>
<style>
  body { font-family: monospace; background: #111; color: #0f0; padding: 20px; }
  h2   { color: #fff; }
  pre  { background: #222; padding: 10px; border-radius: 4px; white-space: pre-wrap; }
  button { padding: 8px 18px; margin: 6px; cursor: pointer; font-size: 14px; }
  .ok   { color: #0f0; }
  .fail { color: #f55; }
</style>
</head>
<body>
<h2>SpectralSolver Test</h2>
<button onclick="runTest()">Run Test</button>
<pre id="out">Click "Run Test"...</pre>

<script src="js/gpu-fft.js"></script>
<script src="js/spectral-solver.js"></script>
<script>
function log(msg, ok) {
  const pre = document.getElementById('out');
  const cls = (ok === true) ? 'ok' : (ok === false) ? 'fail' : '';
  pre.innerHTML += `<span class="${cls}">${msg}</span>\n`;
}

function runTest() {
  const pre = document.getElementById('out');
  pre.innerHTML = '';

  // ── 1. Init ──────────────────────────────────────────────────────────────
  log('=== SpectralSolver Init ===');
  // 64×64 grid over 320 nm, so dx=5 nm, wall at x=160 nm
  const domainNm = 320;
  const ok = SpectralSolver.init({
    nx: 64, ny: 64,
    worldBounds: { xMin: 0, xMax: domainNm, yMin: 0, yMax: domainNm },
    particleMass: 9.109e-31,
    hbar: 1.054e-25,
    abcWidth: 6   // 6 cells = 30 nm
  });
  log(`  init() returned: ${ok}`, ok);
  if (!ok) { log('ABORTED', false); return; }

  const gi = SpectralSolver.getGridInfo();
  log(`  Grid: ${gi.nx}x${gi.ny}, dx=${gi.dx.toFixed(2)} nm, dt=${gi.dt.toExponential(3)} ns`);

  // ── 2. Build potential ────────────────────────────────────────────────────
  log('\n=== buildPotential ===');
  const wallX = domainNm * 0.5;       // wall at x=160 nm
  SpectralSolver.buildPotential({
    wallX, wallWidth: gi.dx * 2,       // 2 cells wide
    slit1Y: domainNm * 0.35, slit2Y: domainNm * 0.65,
    slitWidth: gi.dy * 3,              // 3 cells wide
    slit1Open: true, slit2Open: true
  });
  log('  buildPotential() OK', true);

  // ── 3. Set CW sources at the two slits ────────────────────────────────────
  log('\n=== setCWSlitSources ===');
  const lam = gi.dx * 4;              // λ = 4 cells
  const k_  = 2 * Math.PI / lam;
  // vphase from de Broglie: p=ℏk, E=p²/2m, ω=E/ℏ = ℏk²/2m
  const hbar_ = 1.054e-25;
  const m_    = 9.109e-31;
  const omega_ = hbar_ * k_ * k_ / (2 * m_);
  log(`  λ=${lam.toFixed(2)} nm, k=${k_.toExponential(3)}/nm, ω=${omega_.toExponential(3)} rad/ns`);

  SpectralSolver.setCWSlitSources({
    sourceX: gi.dx * 2,  sourceY: domainNm * 0.5,
    slit1X: wallX, slit1Y: domainNm * 0.35,
    slit2X: wallX, slit2Y: domainNm * 0.65,
    slit1Open: true, slit2Open: true,
    amplitude: 0.1, omega: omega_, width: gi.dx * 1.5
  });
  log('  setCWSlitSources() OK', true);

  // ── 4. Step and check ──────────────────────────────────────────────────────
  log('\n=== step(500) ===');
  const t0 = performance.now();
  SpectralSolver.step(500);
  const elapsed = (performance.now() - t0).toFixed(1);
  log(`  500 steps in ${elapsed} ms  (${(500 / (performance.now()-t0+1e-9)*1000).toFixed(0)} steps/s)`);

  SpectralSolver.syncCPU();

  // Sample at safe distances from ABC boundary (boundary starts at cell 6 = 30 nm from edge)
  // Left of wall (source side) x = 80 nm
  const pSrc  = SpectralSolver.readPsi(80,  domainNm * 0.5);
  // Right of wall at slit 1 (x = 200 nm, y = 112 nm)
  const pSlit = SpectralSolver.readPsi(wallX + gi.dx * 4, domainNm * 0.35);
  // Detector (x = 260 nm, centered)
  const pDet  = SpectralSolver.readPsi(260, domainNm * 0.5);

  log(`\n  readPsi(80, ${(domainNm*0.5).toFixed(0)}) source side: |ψ|²=${pSrc.psi2.toExponential(3)}`);
  log(`  readPsi(${(wallX+gi.dx*4).toFixed(0)}, ${(domainNm*0.35).toFixed(0)}) past slit1: |ψ|²=${pSlit.psi2.toExponential(3)}`);
  log(`  readPsi(260, ${(domainNm*0.5).toFixed(0)}) detector:    |ψ|²=${pDet.psi2.toExponential(3)}`);

  const activity = pSlit.psi2 > 1e-12;
  log(`\n  Wave past wall: ${activity ? 'YES ✓' : 'NO – check geometry/steps'}`, activity);

  log('\n=== step(1500) more === ');
  SpectralSolver.step(1500);
  SpectralSolver.syncCPU();
  const pDet2 = SpectralSolver.readPsi(260, domainNm * 0.5);
  const pDet3 = SpectralSolver.readPsi(260, domainNm * 0.35);
  log(`  |ψ|²(260, center) = ${pDet2.psi2.toExponential(3)}`);
  log(`  |ψ|²(260, y=slit1)= ${pDet3.psi2.toExponential(3)}`);

  const grew = pDet2.psi2 >= pDet.psi2;
  log(`  Signal at detector ${grew ? 'sustained/grew ✓' : 'shrank (ABC absorbing)'}`, grew);
  log('\n=== DONE ===');
}
</script>
</body>
</html>
