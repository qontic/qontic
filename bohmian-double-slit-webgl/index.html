<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bohmian Double Slit (WebGL2) — Q-Ontic Lab</title>
  <meta name="description" content="WebGL2 Bohmian double-slit simulation with Schrödinger and Pauli spin-1/2 guiding laws. Adapted from Anssi Zander's BohmianDoubleSlit demo." />
  <style>
    html, body { margin:0; height:100%; background:#000; overflow:hidden; font-family: system-ui, sans-serif; }
    #wrap { position:relative; width:100%; height:100%; }
    canvas { width:100%; height:100%; display:block; }
    #ui {
      position:absolute; left:12px; top:12px; width:330px;
      background:rgba(0,0,0,0.55); color:#ddd; padding:12px 12px 10px;
      border:1px solid rgba(255,255,255,0.12); border-radius:10px;
      backdrop-filter: blur(6px);
      user-select:none;
    }
    #ui h3 { margin:0 0 8px 0; font-size:14px; font-weight:600; color:#fff; }
    .row { display:flex; align-items:center; gap:10px; margin:6px 0; }
    .row label { width:120px; font-size:12px; color:#bbb; }
    .row input[type="range"] { flex:1; }
    .row .val { width:76px; text-align:right; font-variant-numeric: tabular-nums; font-size:12px; color:#fff; }
    .btns { display:flex; gap:10px; margin-top:8px; }
    .button-group { flex:1; display:flex; gap:6px; }
    .button-group button { min-width:0; padding:8px 6px; font-size:11px; }
    .button-group button.is-active {
      background:rgba(132,192,255,0.24);
      border-color:rgba(132,192,255,0.72);
      box-shadow: inset 0 0 0 1px rgba(132,192,255,0.18);
    }
    button {
      flex:1; padding:8px 10px; border-radius:8px; border:1px solid rgba(255,255,255,0.2);
      background:rgba(255,255,255,0.08); color:#fff; cursor:pointer;
    }
    button:hover { background:rgba(255,255,255,0.12); }
    .stat { margin-top:8px; font-size:12px; color:#bbb; line-height:1.35; }
    .stat b { color:#fff; font-weight:600; }
    #credit {
      position:absolute; right:12px; bottom:10px; z-index:10;
      color:rgba(255,255,255,0.74); background:rgba(0,0,0,0.42);
      border:1px solid rgba(255,255,255,0.14); border-radius:8px;
      padding:6px 9px; font-size:11px; line-height:1.35;
      backdrop-filter: blur(5px);
    }
    #credit a { color:#9fd0ff; text-decoration:none; }
    #credit a:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="c"></canvas>
    <div id="ui">
      <div style="display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:8px;">
        <h3 style="margin:0; font-size:14px; font-weight:600; color:#fff;">Bohmian Double Slit</h3>
        <button id="minui" title="Minimize/expand" style="
          width:34px; height:28px; padding:0;
          border-radius:8px; border:1px solid rgba(255,255,255,0.2);
          background:rgba(255,255,255,0.08); color:#fff; cursor:pointer;
          display:flex; align-items:center; justify-content:center; font-size:16px; line-height:1;
        ">▾</button>
      </div>
      <div id="uibody">
        <div id="controls"></div>
        <div class="btns">
          <button id="reset">Reset (R)</button>
          <button id="pause">Pause</button>
        </div>
        <div class="stat" id="stats"></div>
      </div>
    </div>
    <div id="credit">
      Adapted for Q-Ontic Lab from
      <a href="https://github.com/anssiZander/BohmianDoubleSlit" target="_blank" rel="noopener">BohmianDoubleSlit</a>
      by Anssi Zander.
    </div>
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
